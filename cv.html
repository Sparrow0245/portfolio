  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to right, #e0f7fa, #b2ebf2, #80deea);
      color: #333333;
      line-height: 1.6;
    }
    header {
      text-align: center;
      padding: 4rem 2rem;
      background-color: rgba(255, 255, 255, 0.7);
    }
    header h1 {
      font-size: 3.2rem;
      margin-bottom: 0.5rem;
      color: #33b5e5;
      text-shadow: 0 0 10px rgba(51, 181, 229, 0.7);
    }
    header p {
      font-style: italic;
      font-size: 1.1rem;
      color: #666666;
    }
    header a {
      color: #33b5e5;
      font-weight: 600;
      text-decoration: none;
    }
    section {
      max-width: 1000px;
      margin: 2rem auto;
      padding: 2rem;
      background-color: rgba(255, 255, 255, 0.87);
      border-radius: 15px;
      box-shadow: 0 0 15px rgba(51, 181, 229, 0.15);
    }
    h2 {
      color: #33b5e5;
      margin-bottom: 1rem;
      border-bottom: 2px solid #33b5e5;
      display: inline-block;
      padding-bottom: 0.3rem;
      font-size: 1.6rem;
      text-shadow: 0 0 5px rgba(51, 181, 229, 0.5);
    }
    .cv-toolbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 1rem;
    }
    .btn-download {
      background-color: #33b5e5;
      color: #fff;
      border: none;
      padding: 0.6rem 1.4rem;
      border-radius: 8px;
      font-family: 'Poppins', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 0 10px rgba(51, 181, 229, 0.4);
      transition: background-color 0.2s;
    }
    .btn-download:hover {
      background-color: #1a9fd4;
    }
    iframe {
      width: 100%;
      height: 85vh;
      border: 2px solid #33b5e5;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(51, 181, 229, 0.3);
    }
    .contact {
      background-color: rgba(240, 240, 240, 0.85);
      color: #444444;
      text-align: center;
      padding: 1.5rem;
      margin-top: 3rem;
    }
    .contact a {
      color: #33b5e5;
      text-decoration: none;
      font-weight: bold;
    }
